; AlphaServer 1000 4/266 "Mikasa" config (read/write disks).
; Use this only on working copies of the disk images.
;
; Run from the SIMH repository root:
;
;   make alpha
;   BIN/alpha alpha/mikasa-fermi-rw.ini

set cpu mikasa-4/266
set cpu 1g
set cpu conhalt
dep mikasa sccscale 2048

; This is the SRM payload extracted from the DEC LFU firmware container with:
;   alpha/tools/extract-lfu-rom.py ../firmware/as1000/mksrmrom.exe ../firmware/as1000/mksrmrom.payload.bin
set mikasa rompayload=../firmware/as1000/mksrmrom.payload.bin

attach dka0 "../Alphaserver 1000 (4-266) - Fisica/disco1.img"
attach dka100 "../Alphaserver 1000 (4-266) - Fisica/disco2.img"
attach dka200 "../Alphaserver 1000 (4-266) - Fisica/disco3.img"
attach dka300 "../Alphaserver 1000 (4-266) - Fisica/disco4.img"

; Start SRM firmware. From SRM prompt, use BOOT DKA0.
boot cpu
