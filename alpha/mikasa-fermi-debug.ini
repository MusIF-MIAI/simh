; Debug variant: SIMH remote console is kept on a telnet socket.
;
; Start the proxy first:
;
;   python3 alpha/tools/simh-console-proxy.py --simh-port 23230 --listen-port 23231
;
; Then start SIMH:
;
;   BIN/alpha alpha/mikasa-fermi-debug.ini
;
; Connect/reconnect freely through the proxy:
;
;   nc 127.0.0.1 23231
;
; Remote console accepts one command per connection. Send Ctrl-E to enter
; multiple-command mode through the persistent proxy.

set console wru=5
set console telnet=23232
set console telnet=buffered=1048576
set remote connections=1
set remote timeout=0
set remote telnet=23230

set cpu mikasa-4/266
set cpu 1g
set cpu conhalt
set cpu history=500

attach -r dka0 "../Alphaserver 1000 (4-266) - Fisica/disco1.img"
attach -r dka100 "../Alphaserver 1000 (4-266) - Fisica/disco2.img"
attach -r dka200 "../Alphaserver 1000 (4-266) - Fisica/disco3.img"
attach -r dka300 "../Alphaserver 1000 (4-266) - Fisica/disco4.img"

set dka0 osflags=0
boot dka0
set remote master
