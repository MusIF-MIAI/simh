; Debug variant: SRM-first boot with SIMH remote control and guest console on
; telnet sockets.
;
; Start the proxy first:
;
;   python3 alpha/tools/simh-console-proxy.py --simh-port 23230 --listen-port 23231
;
; Then start SIMH:
;
;   BIN/alpha alpha/mikasa-fermi-debug.ini
;
; Connect/reconnect freely through the proxy:
;
;   nc 127.0.0.1 23231
;
; Connect to the Alpha serial console:
;
;   nc 127.0.0.1 23232
;
; The SIMH remote accepts one command per connection. Send Ctrl-E to enter
; multiple-command mode through the persistent proxy, then use commands like
; `show history`, `ex pc`, `step`, and `continue` without restarting SIMH.

set console wru=5
set console telnet=23232
set console telnet=buffered=1048576
set remote connections=1
set remote timeout=0
set remote telnet=23230
set remote master

set cpu mikasa-4/266
set cpu 1g
set cpu conhalt
set cpu history=500
dep mikasa sccscale 65536

; This is the SRM payload extracted from the DEC LFU firmware container with:
;   alpha/tools/extract-lfu-rom.py ../firmware/as1000/mksrmrom.exe ../firmware/as1000/mksrmrom.payload.bin
set mikasa rompayload=../firmware/as1000/mksrmrom.payload.bin

attach -r dka0 "../Alphaserver 1000 (4-266) - Fisica/disco1.img"
attach -r dka100 "../Alphaserver 1000 (4-266) - Fisica/disco2.img"
attach -r dka200 "../Alphaserver 1000 (4-266) - Fisica/disco3.img"
attach -r dka300 "../Alphaserver 1000 (4-266) - Fisica/disco4.img"

; Start the real Mikasa SRM firmware. From the SRM prompt, use:
;
;   boot dka0 -fl 0,10000
boot cpu
